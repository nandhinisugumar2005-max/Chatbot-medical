<!DOCTYPE html>
<html>
<head>
  <title>Health Chatbot</title>

  <!-- Dialogflow Messenger -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    df-messenger {
      --df-messenger-button-titlebar-color: #4CAF50;
      --df-messenger-chat-background-color: #f0f8ff;
      --df-messenger-font-color: black;
      --df-messenger-user-message: #d1e7dd;
      --df-messenger-bot-message: #ffffff;
      --df-messenger-send-icon: #4CAF50;
    }
  </style>
</head>

<body>

<!-- Chatbot UI -->
<df-messenger
  intent="WELCOME"
  chat-title="Health Assistant"
  agent-id="nandhini-ibfi"
  language-code="en">
</df-messenger>

<!-- Voice Function -->
<script>
function speak(text) {
  if (!text) return;
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-IN";
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(speech);
}
</script>

<!-- Capture Bot Response -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const dfMessenger = document.querySelector("df-messenger");

  dfMessenger.addEventListener("df-response-received", function (event) {
    try {
      let messages = event.detail.response.queryResult.fulfillmentMessages;

      if (messages && messages.length > 0) {
        let text = messages[0].text.text[0];
        speak(text);
      }
    } catch (e) {
      console.log("Voice error:", e);
    }
  });
});
</script>

</body>
</html>
